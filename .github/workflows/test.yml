name: test

# Build, vet, lint, unit-test, and run the acceptance suite against a
# disposable BridgePort image on every PR and on pushes to master.
#
# NOTE: this workflow deliberately uses only GitHub-owned actions
# (actions/checkout, actions/setup-go) plus plain run-steps, so it works under
# a restrictive org "allowed actions" policy without extra allowlisting.
# Third-party tools (golangci-lint, terraform) are installed via run-steps.
#
# The expensive jobs run only when *meaningful* (code/build-affecting) files
# change. They are gated with a job-level `if:` rather than an `on:`-level
# `paths` filter on purpose: a workflow skipped by a path filter never reports
# its checks, so a *required* check stays "Pending" and blocks merging — whereas
# a job skipped by `if:` reports "Success" and satisfies the required check. So
# a docs-only PR skips the build/lint/acceptance work but still merges cleanly.
# See: https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/troubleshooting-required-status-checks

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  # Detect whether this change touches code/build files. Cheap (a few seconds),
  # always runs, and is fail-safe: if it cannot determine the diff it assumes a
  # code change so the real checks still run.
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -uo pipefail

          if [ "$EVENT" = "pull_request" ]; then
            git fetch --no-tags --quiet origin "$BASE_REF" || true
            changed="$(git diff --name-only "origin/${BASE_REF}...HEAD")" || changed="__ERR__"
          elif [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # First push to a new branch / no parent: treat everything as changed.
            changed="$(git ls-files)"
          else
            changed="$(git diff --name-only "$BEFORE" HEAD)" || changed="__ERR__"
          fi

          if [ "$changed" = "__ERR__" ]; then
            echo "Could not determine changed files; running checks to be safe."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          printf '%s\n' "$changed"

          code=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.go|go.mod|go.sum|.golangci.yml|scripts/*|.github/workflows/*)
                code=true ;;
            esac
          done <<EOF
          $changed
          EOF

          echo "meaningful code change: $code"
          echo "code=$code" >> "$GITHUB_OUTPUT"

  build:
    name: build & vet
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: go mod verify
      # Fail if go.mod/go.sum aren't tidy.
      - run: go mod tidy
      - run: git diff --exit-code go.mod go.sum
      - run: gofmt -l -s . | tee /tmp/fmt.out && test ! -s /tmp/fmt.out
      - run: go build -v ./...
      - run: go vet ./...
      - run: go test -v -cover -timeout=120s ./...

  lint:
    name: golangci-lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - name: Install golangci-lint
        # Pin a release built with Go >= the module's `go` directive; an older
        # golangci-lint refuses to lint a newer-Go module.
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
      - run: "$(go env GOPATH)/bin/golangci-lint run --timeout 5m"

  acceptance:
    name: acceptance (TF_ACC) against built image
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    env:
      # Pull the public edge image the platform repo publishes on every master
      # push. Override to test a PR-built image (see the manual checklist for
      # wiring this into the platform repo's provider-compat job, issue #202).
      BRIDGEPORT_IMAGE: ghcr.io/bridgeinpt/bridgeport:edge
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - name: Install Terraform CLI
        run: |
          TF_VERSION=1.9.8
          curl -sSfL -o /tmp/tf.zip \
            "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip"
          sudo unzip -o /tmp/tf.zip -d /usr/local/bin
          terraform version
      - name: Run acceptance suite
        run: ./scripts/acc-harness.sh test
