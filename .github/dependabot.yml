version: 2
updates:
  # Go provider module (terraform-plugin-framework + BridgePort Go SDK)
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    cooldown:
      default-days: 3
      semver-major-days: 3
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      go-security:
        applies-to: security-updates
        patterns: ["*"]
      go-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    cooldown:
      # github-actions does not support the semver-*-days cooldown granularity
      default-days: 3
    groups:
      actions-security:
        applies-to: security-updates
        patterns: ["*"]
      actions-version:
        applies-to: version-updates
        patterns: ["*"]
