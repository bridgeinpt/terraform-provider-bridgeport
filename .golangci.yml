# golangci-lint configuration for the BridgePort Terraform provider.
# Run with: golangci-lint run   (or `make lint`)
version: "2"

run:
  timeout: 5m

linters:
  # `default: standard` (errcheck, govet, ineffassign, staticcheck, unused) is
  # implied; the list below is added on top.
  enable:
    - misspell
    - unconvert
    - unparam
    - whitespace

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
